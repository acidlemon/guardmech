name: Go
on: [push]

permissions:
  contents: read

jobs:

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: guardmech
          MYSQL_DATABASE: guardmech_test
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -pguardmech"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: backend/go.mod
        cache-dependency-path: backend/go.sum

    - name: Build
      run: go build -v .
      working-directory: backend

    - name: Test
      run: go test -v ./...
      working-directory: backend
      env:
        GUARDMECH_DB_HOST: 127.0.0.1
        GUARDMECH_DB_PORT: "13306"
        GUARDMECH_DB_USER: root
        GUARDMECH_DB_PASSWORD: guardmech
        GUARDMECH_DB_NAME: guardmech_test
